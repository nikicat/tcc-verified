# Bakes the vast.ai prover image (CUDA toolchains + warm build caches) and
# pushes it to ghcr, so GPU instances boot ready in minutes instead of doing
# a ~35-minute provisioning build.
#
# NOTE: after the first push, set the package visibility to public
# (github.com -> Packages -> tcc-verified-prover -> settings) so vast.ai
# hosts can pull it without registry credentials.
name: bake-prover-image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - cloud/Dockerfile
      - rust-toolchain.toml
      - Cargo.lock
      - .github/workflows/bake-prover-image.yml

permissions:
  contents: read
  packages: write

jobs:
  bake:
    runs-on: ubuntu-latest
    steps:
      # the image is ~20 GB; the stock runner has too little free disk
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/local/.ghcup
          sudo docker image prune -af
          df -h /

      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: cloud/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/tcc-verified-prover:latest
            ghcr.io/${{ github.repository_owner }}/tcc-verified-prover:${{ github.sha }}
