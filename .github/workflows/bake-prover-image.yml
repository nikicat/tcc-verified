# Bakes the vast.ai prover image (CUDA toolchains + warm build caches) and
# pushes it to ghcr, so GPU instances boot ready in minutes instead of doing
# a ~35-minute provisioning build.
#
# NOTE: after the first push, set the package visibility to public
# (github.com -> Packages -> tcc-verified-prover -> settings) so vast.ai
# hosts can pull it without registry credentials.
name: bake-prover-image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - cloud/Dockerfile
      - rust-toolchain.toml
      - Cargo.lock
      - .github/workflows/bake-prover-image.yml

permissions:
  contents: read
  packages: write

jobs:
  bake:
    runs-on: ubuntu-latest
    # a failed CUDA kernel compile makes cargo "fail slowly" (parallel nvcc
    # jobs drain for an hour+); don't let doomed runs burn the 6h ceiling
    timeout-minutes: 150
    steps:
      # the image is ~20 GB; the stock runner has too little free disk
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/local/.ghcup
          sudo docker image prune -af
          df -h /

      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # container driver is required for registry-backed layer caching
      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: cloud/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/tcc-verified-prover:latest
            ghcr.io/${{ github.repository_owner }}/tcc-verified-prover:${{ github.sha }}
          # mode=max also exports the cargo-chef cook layer (the CUDA kernel
          # build), so source-only rebakes skip the expensive phase entirely
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/tcc-verified-prover:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/tcc-verified-prover:buildcache,mode=max

      # the canonical compiler id, straight from the trusted build — compare
      # against the repo's CANONICAL_IMAGE_ID (and update the pin on change)
      - name: Report canonical IMAGE_ID
        run: |
          ID=$(docker run --rm ghcr.io/${{ github.repository_owner }}/tcc-verified-prover:${{ github.sha }} \
              /opt/tcc-verified/target/release/host --image-id)
          echo "canonical IMAGE_ID: $ID" | tee -a "$GITHUB_STEP_SUMMARY"
          if [ -f CANONICAL_IMAGE_ID ] && [ "$(cat CANONICAL_IMAGE_ID)" != "$ID" ]; then
            echo "::warning::IMAGE_ID drifted from pinned CANONICAL_IMAGE_ID — update the pin"
          fi
